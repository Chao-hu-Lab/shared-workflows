name: "Python Build (Reusable)"

on:
  workflow_call:
    inputs:
      upload_artifact:
        description: "Upload build artifact"
        type: boolean
        required: false
        default: true
      spec-file:
        description: "PyInstaller spec file name"
        type: string
        required: false
        default: "ms-preprocessing.spec"
      executable-name:
        description: "Built executable base name (without extension)"
        type: string
        required: false
        default: "ms-preprocessing"
      artifact-prefix:
        description: "Prefix for artifact zip file names"
        type: string
        required: false
        default: "ms-preprocessing"
      install-command:
        description: "Install command (e.g. 'pip install -e . pyinstaller' or 'pip install -r requirements.txt pyinstaller')"
        type: string
        required: false
        default: "pip install -e . pyinstaller"
      pythonpath:
        description: "PYTHONPATH for build step (leave empty if not needed)"
        type: string
        required: false
        default: ""
      version-source:
        description: "'pyproject' reads from pyproject.toml; 'tag' uses git tag or dev-<sha>"
        type: string
        required: false
        default: "pyproject"
      extra-package-files:
        description: "JSON array of {src, dst} to copy into distribution (e.g. [{\"src\":\"README.md\",\"dst\":\"README.md\"}])"
        type: string
        required: false
        default: '[]'
      verify-command:
        description: "Command to verify the built executable (use {exe} as placeholder). Empty to skip."
        type: string
        required: false
        default: ""
      platforms:
        description: "JSON array of platforms to build, e.g. '[\"windows\"]' or '[\"windows\",\"macos\"]'"
        type: string
        required: false
        default: '["windows", "macos"]'

jobs:
  # ------------------------------------------------------------------
  # Setup job: compute build matrix from inputs.platforms
  # ------------------------------------------------------------------
  setup:
    name: "Resolve build matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          python3 -c "
          import json, os
          platforms = json.loads('${{ inputs.platforms }}')
          mapping = {
              'windows': {'os': 'windows-latest', 'platform': 'Windows'},
              'macos':   {'os': 'macos-latest',   'platform': 'macOS'},
          }
          include = [mapping[p] for p in platforms if p in mapping]
          if not include:
              raise SystemExit('No valid platforms in: ' + str(platforms))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('matrix=' + json.dumps({'include': include}) + '\n')
          "

  # ------------------------------------------------------------------
  # Build job: runs per platform
  # ------------------------------------------------------------------
  build:
    name: "Build ${{ matrix.platform }}"
    needs: setup
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Determine package version
        id: meta
        shell: bash
        run: |
          if [[ "${{ inputs.version-source }}" == "pyproject" ]]; then
            project_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["project"]["version"])
          PY
            )"
          else
            project_version=""
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            package_version="${GITHUB_REF#refs/tags/}"
            if [[ -n "$project_version" && "$package_version" != "v${project_version}" ]]; then
              echo "Tag ${package_version} does not match project version v${project_version}" >&2
              exit 1
            fi
          elif [[ -n "$project_version" ]]; then
            package_version="v${project_version}-dev"
          else
            package_version="dev-$(git rev-parse --short HEAD)"
          fi

          artifact_stem="${{ inputs.artifact-prefix }}-${{ matrix.platform }}-${package_version}"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "artifact_stem=${artifact_stem}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Build package
        run: pyinstaller ${{ inputs.spec-file }} --clean --noconfirm
        env:
          PYTHONPATH: ${{ inputs.pythonpath }}

      # --- Verify (optional) -------------------------------------------
      - name: Verify Windows executable
        if: matrix.os == 'windows-latest' && inputs.verify-command != ''
        shell: pwsh
        run: |
          $exePath = "dist\${{ inputs.executable-name }}.exe"
          $cmdLine = "${{ inputs.verify-command }}" -replace '\{exe\}', $exePath
          & cmd /c $cmdLine

      - name: Verify macOS executable
        if: matrix.os == 'macos-latest' && inputs.verify-command != ''
        shell: bash
        run: |
          exe_path="dist/${{ inputs.executable-name }}.app/Contents/MacOS/${{ inputs.executable-name }}"
          cmd_line="${{ inputs.verify-command }}"
          cmd_line="${cmd_line//\{exe\}/$exe_path}"
          $cmd_line

      # --- Package ------------------------------------------------------
      - name: Package Windows zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $artifactStem = "${{ steps.meta.outputs.artifact_stem }}"
          $stageDir = Join-Path $env:RUNNER_TEMP $artifactStem
          $archivePath = Join-Path "dist" "$artifactStem.zip"
          if (Test-Path $stageDir) { Remove-Item $stageDir -Recurse -Force }
          if (Test-Path $archivePath) { Remove-Item $archivePath -Force }
          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item "dist\${{ inputs.executable-name }}.exe" (Join-Path $stageDir "$artifactStem.exe")

          # Copy extra package files (supports nested dst paths)
          $extras = '${{ inputs.extra-package-files }}' | ConvertFrom-Json
          foreach ($item in $extras) {
            if (Test-Path $item.src) {
              $dstPath = Join-Path $stageDir $item.dst
              $dstDir = Split-Path $dstPath -Parent
              if (-not (Test-Path $dstDir)) { New-Item -ItemType Directory -Path $dstDir -Force | Out-Null }
              Copy-Item $item.src $dstPath
            }
          }

          Compress-Archive -Path $stageDir -DestinationPath $archivePath -Force

      - name: Package macOS zip
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          artifact_stem="${{ steps.meta.outputs.artifact_stem }}"
          stage_dir="$RUNNER_TEMP/$artifact_stem"
          archive_path="dist/${artifact_stem}.zip"
          rm -rf "$stage_dir" "$archive_path"
          mkdir -p "$stage_dir"
          cp -R "dist/${{ inputs.executable-name }}.app" "$stage_dir/${artifact_stem}.app"

          # Copy extra package files (supports nested dst paths)
          STAGE_DIR="$stage_dir" python3 -c "
          import json, sys, shutil, os, pathlib
          extras = json.load(sys.stdin)
          stage = os.environ['STAGE_DIR']
          for item in extras:
              if os.path.exists(item['src']):
                  dst = os.path.join(stage, item['dst'])
                  pathlib.Path(dst).parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(item['src'], dst)
          " <<< '${{ inputs.extra-package-files }}'

          ditto -c -k --sequesterRsrc --keepParent "$stage_dir" "$archive_path"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_stem }}
          path: dist/${{ steps.meta.outputs.artifact_stem }}.zip
          retention-days: 7

  # ------------------------------------------------------------------
  # Release job: creates GitHub Release on tag push
  # ------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.artifact-prefix }}-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
