name: "Setup Python with uv"
description: "Checkout repo (with optional submodules), install uv, and install project dependencies"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  submodules:
    description: "Pass 'true' to checkout submodules recursively"
    required: false
    default: "false"
  install-args:
    description: "Arguments for uv pip install (default installs dev extras)"
    required: false
    default: "-e .[dev]"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: ${{ inputs.submodules == 'true' && 'recursive' || 'false' }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv pip install ${{ inputs.install-args }} --system
